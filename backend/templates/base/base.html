<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Milkman Day 2{% endblock %}</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background: #212529; color: white; padding-top: 20px; }
        .sidebar a { color: #adb5bd; text-decoration: none; display: block; padding: 10px 20px; }
        .sidebar a:hover { background: #343a40; color: white; }
        .sidebar a.active { background: #0d6efd; color: white; }
        .main-content { padding: 20px; }
        .card { border: none; box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075); }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav class="col-md-2 d-none d-md-block sidebar">
                <h4 class="px-3 mb-4">Milkman Pro</h4>
                <a href="{% url 'frontend-dashboard' %}" class="{% if request.resolver_match.url_name == 'frontend-dashboard' %}active{% endif %}">Dashboard</a>
                <a href="{% url 'frontend-customer-list' %}" class="{% if 'customer' in request.path %}active{% endif %}">Customers</a>
                <a href="{% url 'frontend-category-list' %}" class="{% if 'category' in request.path %}active{% endif %}">Categories</a>
                <a href="{% url 'frontend-product-list' %}" class="{% if 'product' in request.path %}active{% endif %}">Products</a>
                <a href="{% url 'frontend-subscription-list' %}" class="{% if 'subscription' in request.path %}active{% endif %}">Subscriptions</a>
                <hr class="mx-3">
                <a href="/admin/">Admin Panel</a>
            </nav>

            <!-- Main Content -->
            <main class="col-md-10 ms-sm-auto main-content">
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                    {% endfor %}
                {% endif %}

                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
