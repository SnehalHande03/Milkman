<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="page-title m-0">Products</h2>
    <button class="btn btn-primary btn-sm px-4">
        <i class="fas fa-plus me-2"></i>New Product
    </button>
</div>

<div class="row">
    <div class="col-md-4 mb-4" ng-repeat="prod in products">
        <div class="card h-100 border-0">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-start mb-3">
                    <span class="badge bg-soft-primary small">{{prod.category_name}}</span>
                    <div class="text-dark fw-bold">${{prod.price}}</div>
                </div>
                <h5 class="fw-bold text-dark mb-1">{{prod.name}}</h5>
                <p class="text-muted small mb-4">Unit: {{prod.unit}}</p>
                
                <div class="d-flex justify-content-between border-top pt-3">
                    <button class="btn btn-sm btn-link text-primary p-0">Edit Product</button>
                    <button class="btn btn-sm btn-link text-danger p-0"><i class="fas fa-trash"></i></button>
                </div>
            </div>
        </div>
    </div>
</div>
