<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="page-title m-0">Customers</h2>
    <button class="btn btn-primary btn-sm px-4">
        <i class="fas fa-plus me-2"></i>New Customer
    </button>
</div>

<div class="card border-0">
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead>
                    <tr>
                        <th class="ps-4">Full Name</th>
                        <th>Email & Phone</th>
                        <th>Address</th>
                        <th class="text-end pe-4">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr ng-repeat="cust in customers">
                        <td class="ps-4">
                            <div class="d-flex align-items-center">
                                <div class="bg-soft-primary rounded-circle p-2 me-3 small">
                                    <i class="fas fa-user"></i>
                                </div>
                                <span class="fw-semibold text-dark">{{cust.name}}</span>
                            </div>
                        </td>
                        <td>
                            <div class="text-dark small">{{cust.email}}</div>
                            <div class="text-muted small">{{cust.phone}}</div>
                        </td>
                        <td class="text-muted small">{{cust.address}}</td>
                        <td class="text-end pe-4">
                            <button class="btn btn-sm btn-link text-primary p-0 me-3"><i class="fas fa-pen"></i></button>
                            <button class="btn btn-sm btn-link text-danger p-0"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
