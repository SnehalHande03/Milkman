<!DOCTYPE html>
<html lang="en" ng-app="milkmanApp" ng-controller="MainCtrl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milkman Pro - Professional Management</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- AngularJS -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular-route.min.js"></script>
    <style>
        :root {
            --primary-color: #0d6efd;
            --sidebar-bg: #ffffff;
            --sidebar-border: #e9ecef;
            --sidebar-text: #495057;
            --sidebar-hover-bg: #f8f9fa;
            --body-bg: #f4f7f6;
            --card-shadow: 0 0.75rem 1.5rem rgba(18, 38, 63, 0.03);
        }

        body { 
            font-family: 'Inter', sans-serif;
            background-color: var(--body-bg);
            color: #334155;
        }

        /* Sidebar Styling - Light Theme */
        .sidebar { 
            min-height: 100vh; 
            background: var(--sidebar-bg); 
            color: var(--sidebar-text); 
            padding-top: 0;
            border-right: 1px solid var(--sidebar-border);
            transition: all 0.3s;
        }
        
        .sidebar-brand {
            padding: 25px;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary-color);
            border-bottom: 1px solid var(--sidebar-border);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }

        .sidebar a { 
            color: var(--sidebar-text); 
            text-decoration: none; 
            display: flex;
            align-items: center;
            padding: 12px 25px; 
            font-weight: 500;
            font-size: 0.9rem;
            transition: 0.2s;
            border-radius: 0 50px 50px 0;
            margin-right: 15px;
        }

        .sidebar a i {
            margin-right: 12px;
            font-size: 1rem;
            width: 20px;
            text-align: center;
            opacity: 0.7;
        }

        .sidebar a:hover { 
            background: var(--sidebar-hover-bg); 
            color: var(--primary-color); 
        }

        .sidebar a.active { 
            background: rgba(13, 110, 253, 0.08);
            color: var(--primary-color);
            font-weight: 600;
        }

        /* Main Content Styling */
        .main-content { 
            padding: 40px; 
        }

        .page-title {
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 1.5rem;
        }

        .card { 
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            box-shadow: var(--card-shadow); 
            margin-bottom: 24px;
        }

        .card-header {
            background: transparent;
            border-bottom: 1px solid #f1f5f9;
            padding: 1.25rem;
            font-weight: 600;
        }

        /* Stat Cards - Professional Light */
        .stat-card {
            padding: 24px;
            border-radius: 10px;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            box-shadow: var(--card-shadow);
            display: flex;
            align-items: center;
        }
        
        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            margin-right: 16px;
        }

        .bg-soft-primary { background-color: rgba(13, 110, 253, 0.1); color: #0d6efd; }
        .bg-soft-success { background-color: rgba(25, 135, 84, 0.1); color: #198754; }
        .bg-soft-warning { background-color: rgba(255, 193, 7, 0.1); color: #ffc107; }

        /* Login Styling - Clean & Light */
        .login-wrapper {
            background-color: var(--body-bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            padding: 40px;
            border: 1px solid #e2e8f0;
        }

        /* Table Styling */
        .table thead th {
            background-color: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            color: #64748b;
            text-transform: uppercase;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.025em;
            padding: 12px 16px;
        }
        
        .table td {
            padding: 16px;
            vertical-align: middle;
            border-bottom: 1px solid #f1f5f9;
        }
        
        .btn-primary {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
    </style>
</head>
<body>
    <div class="container-fluid p-0">
        <div class="row g-0">
            <!-- Sidebar (Only shown if logged in) -->
            <nav class="col-md-2 d-none d-md-block sidebar" ng-if="isLoggedIn">
                <div class="sidebar-brand">
                    <i class="fas fa-tint me-2"></i>Milkman Pro
                </div>
                <div class="px-2">
                    <a href="#!/dashboard" ng-class="{active: isActive('/dashboard')}">
                        <i class="fas fa-grid-2"></i>Dashboard
                    </a>
                    <a href="#!/customers" ng-class="{active: isActive('/customers')}">
                        <i class="fas fa-user-group"></i>Customers
                    </a>
                    <a href="#!/categories" ng-class="{active: isActive('/categories')}">
                        <i class="fas fa-layer-group"></i>Categories
                    </a>
                    <a href="#!/products" ng-class="{active: isActive('/products')}">
                        <i class="fas fa-cube"></i>Products
                    </a>
                    <a href="#!/subscriptions" ng-class="{active: isActive('/subscriptions')}">
                        <i class="fas fa-calendar-days"></i>Subscriptions
                    </a>
                </div>
                
                <div class="mt-auto position-absolute bottom-0 w-100 pb-4">
                    <hr class="mx-3 opacity-10">
                    <a href="" ng-click="logout()" class="text-danger">
                        <i class="fas fa-arrow-right-from-bracket"></i>Logout
                    </a>
                    <a href="/admin/" target="_blank">
                        <i class="fas fa-shield-halved"></i>Admin Panel
                    </a>
                </div>
            </nav>

            <!-- Main Content -->
            <main ng-class="isLoggedIn ? 'col-md-10 main-content' : 'col-md-12 p-0'">
                <div ng-view></div>
            </main>
        </div>
    </div>

    <script>
        var app = angular.module('milkmanApp', ['ngRoute']);

        app.config(function($routeProvider) {
            $routeProvider
            .when("/login", { templateUrl : "/static/ng-templates/login.html", controller : "LoginCtrl" })
            .when("/dashboard", { templateUrl : "/static/ng-templates/dashboard.html", controller : "DashboardCtrl" })
            .when("/categories", { templateUrl : "/static/ng-templates/category_list.html", controller : "CategoryCtrl" })
            .when("/customers", { templateUrl : "/static/ng-templates/customer_list.html", controller : "CustomerCtrl" })
            .when("/products", { templateUrl : "/static/ng-templates/product_list.html", controller : "ProductCtrl" })
            .when("/subscriptions", { templateUrl : "/static/ng-templates/subscription_list.html", controller : "SubscriptionCtrl" })
            .otherwise({ redirectTo: '/login' });
        });

        app.controller('MainCtrl', function($scope, $location) {
            $scope.isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
            $scope.isActive = function (viewLocation) { return viewLocation === $location.path(); };
            $scope.logout = function() {
                localStorage.removeItem('isLoggedIn');
                $scope.isLoggedIn = false;
                $location.path('/login');
            };
            $scope.$on('$routeChangeStart', function(event, next, current) {
                if (!$scope.isLoggedIn && next.templateUrl !== "/static/ng-templates/login.html") {
                    $location.path('/login');
                }
            });
        });

        app.controller('LoginCtrl', function($scope, $http, $location) {
            $scope.credentials = {};
            $scope.login = function() {
                $http.get('/staff/').then(function(res) {
                    var user = res.data.find(s => s.email === $scope.credentials.email && s.password === $scope.credentials.password);
                    if (user) {
                        localStorage.setItem('isLoggedIn', 'true');
                        $scope.$parent.isLoggedIn = true;
                        $location.path('/dashboard');
                    } else {
                        $scope.error = "Invalid credentials!";
                    }
                });
            };
        });

        app.controller('DashboardCtrl', function($scope, $http) {
            $scope.stats = {};
            $http.get('/category/').then(function(res) { $scope.stats.categories = res.data.length; });
            $http.get('/customer/').then(function(res) { $scope.stats.customers = res.data.length; });
            $http.get('/product/').then(function(res) { $scope.stats.products = res.data.length; });
            $http.get('/subscription/').then(function(res) { 
                $scope.stats.subscriptions = res.data.length; 
                $scope.recentSubscriptions = res.data.slice(-5);
            });
        });

        app.controller('CategoryCtrl', function($scope, $http) {
            $http.get('/category/').then(function(response) { $scope.categories = response.data; });
        });

        app.controller('CustomerCtrl', function($scope, $http) {
            $http.get('/customer/').then(function(response) { $scope.customers = response.data; });
        });

        app.controller('ProductCtrl', function($scope, $http) {
            $http.get('/product/').then(function(response) { $scope.products = response.data; });
        });

        app.controller('SubscriptionCtrl', function($scope, $http) {
            $http.get('/subscription/').then(function(response) { $scope.subscriptions = response.data; });
        });
    </script>
</body>
</html>
