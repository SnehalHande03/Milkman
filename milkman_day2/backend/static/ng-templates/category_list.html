<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="page-title m-0">Categories</h2>
    <button class="btn btn-primary btn-sm px-4">
        <i class="fas fa-plus me-2"></i>New Category
    </button>
</div>

<div class="card border-0">
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead>
                    <tr>
                        <th class="ps-4"># ID</th>
                        <th>Name</th>
                        <th>Description</th>
                        <th class="text-end pe-4">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr ng-repeat="cat in categories">
                        <td class="ps-4 text-muted small">#{{cat.id}}</td>
                        <td><span class="fw-semibold text-dark">{{cat.name}}</span></td>
                        <td class="text-muted small">{{cat.description || 'No description'}}</td>
                        <td class="text-end pe-4">
                            <button class="btn btn-sm btn-link text-primary p-0 me-3"><i class="fas fa-pen"></i></button>
                            <button class="btn btn-sm btn-link text-danger p-0"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
