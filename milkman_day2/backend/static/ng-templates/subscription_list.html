<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="page-title m-0">Subscriptions</h2>
    <button class="btn btn-primary btn-sm px-4">
        <i class="fas fa-plus me-2"></i>New Subscription
    </button>
</div>

<div class="card border-0">
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead>
                    <tr>
                        <th class="ps-4">Customer</th>
                        <th>Product</th>
                        <th>Quantity</th>
                        <th>Start Date</th>
                        <th class="text-center">Status</th>
                        <th class="text-end pe-4">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr ng-repeat="sub in subscriptions">
                        <td class="ps-4">
                            <div class="fw-semibold text-dark">{{sub.customer_name}}</div>
                        </td>
                        <td><span class="text-muted">{{sub.product_name}}</span></td>
                        <td>{{sub.quantity}} L</td>
                        <td class="text-muted small">{{sub.start_date}}</td>
                        <td class="text-center">
                            <span class="badge" ng-class="sub.is_active ? 'bg-soft-success' : 'bg-soft-danger'">
                                {{sub.is_active ? 'Active' : 'Inactive'}}
                            </span>
                        </td>
                        <td class="text-end pe-4">
                            <button class="btn btn-sm btn-link text-primary p-0 me-3"><i class="fas fa-pen"></i></button>
                            <button class="btn btn-sm btn-link text-danger p-0"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
